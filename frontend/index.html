<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthScan | AI Fake News Detector</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

:root{
--primary:#6366f1;
--secondary:#a855f7;
--bg:#f8fafc;
--card-bg:rgba(255,255,255,0.8);
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#e0e7ff 0%,#f3e8ff 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:#1e293b;
}

.container{
width:90%;
max-width:600px;
background:var(--card-bg);
backdrop-filter:blur(10px);
padding:2.5rem;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
border:1px solid rgba(255,255,255,0.3);
}

h1{
text-align:center;
color:var(--primary);
margin-bottom:0.5rem;
}

p.subtitle{
text-align:center;
color:#64748b;
margin-bottom:2rem;
}

.input-group{
margin-bottom:1.5rem;
}

label{
display:block;
margin-bottom:0.5rem;
font-weight:600;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:12px;
border:2px solid #e2e8f0;
resize:none;
box-sizing:border-box;
transition:0.3s;
}

textarea:focus{
outline:none;
border-color:var(--primary);
}

.upload-section{
border:2px dashed var(--primary);
padding:20px;
border-radius:12px;
text-align:center;
cursor:pointer;
background:rgba(99,102,241,0.05);
transition:0.3s;
}

.upload-section:hover{
background:rgba(99,102,241,0.1);
}

#imageInput{
display:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(to right,var(--primary),var(--secondary));
color:white;
font-size:1rem;
font-weight:600;
cursor:pointer;
box-shadow:0 4px 15px rgba(99,102,241,0.3);
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
opacity:0.9;
}

#status{
margin-top:10px;
font-size:0.9rem;
color:var(--primary);
font-weight:bold;
}

#result{
margin-top:20px;
padding:12px;
border-radius:10px;
background:#eef2ff;
font-weight:bold;
text-align:center;
}

.divider{
text-align:center;
margin:1rem 0;
color:#94a3b8;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>TruthScan AI</h1>
<p class="subtitle">Detect misinformation instantly using text or images.</p>

<div class="input-group">
<label>Upload News Image</label>

<div class="upload-section" onclick="document.getElementById('imageInput').click()">
<span id="uploadText">Click to upload or drag & drop</span>
<input type="file" id="imageInput" accept="image/*">
</div>

<div id="status"></div>
</div>

<div class="divider">OR</div>

<div class="input-group">
<label>Enter News Content</label>
<textarea id="newsText" placeholder="Paste the news text here..."></textarea>
</div>

<button onclick="analyzeNews()">Verify News</button>

<div id="result"></div>

</div>

<script>

const imageInput=document.getElementById('imageInput');
const newsText=document.getElementById('newsText');
const status=document.getElementById('status');
const uploadText=document.getElementById('uploadText');


// OCR Image → Text
imageInput.addEventListener('change',async(e)=>{

const file=e.target.files[0];
if(!file) return;

uploadText.innerText=`Selected: ${file.name}`;
status.innerText="Extracting text...";

try{

const result=await Tesseract.recognize(file,'eng');

newsText.value=result.data.text;

status.innerText="Text extracted successfully!";

}
catch(err){

status.innerText="Error extracting text.";
console.error(err);

}

});


// Send Text to Backend
async function analyzeNews(){

const text=newsText.value.trim();

if(!text){
alert("Please provide some text or image!");
return;
}

document.getElementById("result").innerText="Analyzing news...";

try{

const response=await fetch("http://localhost:5000/check-news",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({news:text})

});

const data=await response.json();

document.getElementById("result").innerText=
"Prediction: "+data.prediction+
" | Confidence: "+data.confidence+"%";

}
catch(err){

document.getElementById("result").innerText="Server error. Check backend.";

}

}

</script>

</body>
</html>
